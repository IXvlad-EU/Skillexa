services:
  skillexa-core:
    build:
      context: ./skillexa-core
      dockerfile: Dockerfile
    container_name: skillexa-core
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - skillexa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  skillexa-engine:
    build:
      context: ./skillexa-engine
      dockerfile: Dockerfile
    container_name: skillexa-engine
    environment:
      - DOTNET_ENVIRONMENT=Production
    networks:
      - skillexa-network
    restart: unless-stopped

  skillexa-portal:
    build:
      context: ./skillexa-portal
      dockerfile: Dockerfile
    container_name: skillexa-portal
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - SKILLEXA_CORE_BASE_URL=http://skillexa-core:8080
    networks:
      - skillexa-network
    restart: unless-stopped

networks:
  skillexa-network:
    driver: bridge
