services:
  skillexa-core:
    build:
      context: .
      dockerfile: ./skillexa-core/Dockerfile
    container_name: skillexa-core
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - AzureAd__TenantId=${ENTRA_TENANT_ID}
      - AzureAd__ClientId=${ENTRA_CORE_CLIENT_ID}
      - AzureAd__Audience=api://${ENTRA_CORE_CLIENT_ID}
      - Messaging__Provider=RabbitMQ
      - Messaging__ConnectionString=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/${RABBITMQ_VHOST}
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - skillexa-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  skillexa-engine:
    build:
      context: .
      dockerfile: ./skillexa-engine/Dockerfile
    container_name: skillexa-engine
    environment:
      - DOTNET_ENVIRONMENT=Production
      - TheirStack__BaseUrl=http://mock-theirstack:3100
      - TheirStack__ApiKey=${THEIRSTACK_API_KEY}
      - Messaging__Provider=RabbitMQ
      - Messaging__ConnectionString=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/${RABBITMQ_VHOST}
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB_ENGINE};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      mock-theirstack:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - skillexa-network
    restart: unless-stopped

  mock-theirstack:
    build:
      context: ./mock-theirstack
      dockerfile: Dockerfile
    container_name: mock-theirstack
    ports:
      - "3100:3100"
    environment:
      - PORT=3100
      - MOCK_API_KEY=${THEIRSTACK_API_KEY}
      - MOCK_DEFAULT_DELAY_MS=0
      - MOCK_FAIL_RATE=0
    networks:
      - skillexa-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3100/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  skillexa-portal:
    build:
      context: ./skillexa-portal
      dockerfile: Dockerfile
    container_name: skillexa-portal
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - SKILLEXA_CORE_BASE_URL=http://skillexa-core:8080
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${AUTH_SECRET}
      - AUTH_MICROSOFT_ENTRA_ID_ID=${ENTRA_PORTAL_CLIENT_ID}
      - AUTH_MICROSOFT_ENTRA_ID_SECRET=${ENTRA_PORTAL_CLIENT_SECRET}
      - AUTH_MICROSOFT_ENTRA_ID_TENANT_ID=${ENTRA_TENANT_ID}
      - AZURE_AD_API_SCOPE=api://${ENTRA_CORE_CLIENT_ID}/access_as_user
    networks:
      - skillexa-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  rabbitmq:
    build:
      context: ./rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "127.0.0.1:15672:15672" # Management UI — localhost only
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_VHOST}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - skillexa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_DB_ENGINE=${POSTGRES_DB_ENGINE}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - skillexa-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} && pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_ENGINE}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  rabbitmq-data:
  postgres-data:

networks:
  skillexa-network:
    driver: bridge
