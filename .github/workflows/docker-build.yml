name: Docker Build Check

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR to avoid wasted resources
concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

# Least privilege — only read repository contents
permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      # Run all builds even if one fails — see all breakages at once
      fail-fast: false
      matrix:
        include:
          - service: skillexa-core
            context: .
            dockerfile: ./skillexa-core/Dockerfile

          - service: skillexa-engine
            context: .
            dockerfile: ./skillexa-engine/Dockerfile

          - service: skillexa-portal
            context: ./skillexa-portal
            dockerfile: ./skillexa-portal/Dockerfile

          - service: mock-theirstack
            context: ./mock-theirstack
            dockerfile: ./mock-theirstack/Dockerfile

          - service: rabbitmq
            context: ./rabbitmq
            dockerfile: ./rabbitmq/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: skillexa/${{ matrix.service }}:${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Verify image was created
        run: docker image inspect skillexa/${{ matrix.service }}:${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || github.sha }}
