trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '10.x'
  NUGET_PACKAGES: $(Pipeline.Workspace)/.nuget/packages

stages:
  # ─── Build & Test ────────────────────────────────────────────────────────────
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: Build
        displayName: 'Build, test, and publish'
        pool:
          vmImage: 'ubuntu-24.04'
        steps:
          - task: UseDotNet@2
            displayName: 'Use .NET $(dotnetVersion)'
            inputs:
              packageType: 'sdk'
              version: $(dotnetVersion)

          - task: Cache@2
            displayName: 'Cache NuGet packages'
            inputs:
              key: 'nuget | "$(Agent.OS)" | **/packages.lock.json,!**/bin/**,!**/obj/**'
              restoreKeys: |
                nuget | "$(Agent.OS)"
              path: $(NUGET_PACKAGES)
            continueOnError: true

          - script: dotnet restore --locked-mode
            displayName: 'Restore NuGet packages'

          - script: dotnet build --no-restore --configuration $(buildConfiguration)
            displayName: 'Build solution'

          - script: dotnet test --no-build --configuration $(buildConfiguration) --logger trx --results-directory $(Agent.TempDirectory)/TestResults
            displayName: 'Run unit tests'

          - task: PublishTestResults@2
            displayName: 'Publish test results'
            condition: always()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '$(Agent.TempDirectory)/TestResults/*.trx'

          - script: dotnet publish --no-build --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/app
            displayName: 'Publish application'

          - task: PublishBuildArtifacts@1
            displayName: 'Upload build artifact'
            inputs:
              pathToPublish: $(Build.ArtifactStagingDirectory)/app
              artifactName: 'app'

  # ─── Deploy to Staging ───────────────────────────────────────────────────────
  - stage: DeployStaging
    displayName: 'Deploy — Staging'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployStaging
        displayName: 'Deploy to staging'
        pool:
          vmImage: 'ubuntu-24.04'
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: app

                - script: echo "Deploy to staging — add your deployment steps here"
                  displayName: 'Deploy'

  # ─── Deploy to Production ────────────────────────────────────────────────────
  - stage: DeployProduction
    displayName: 'Deploy — Production'
    dependsOn: DeployStaging
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProduction
        displayName: 'Deploy to production'
        pool:
          vmImage: 'ubuntu-24.04'
        environment: production   # configure approval gate in Azure DevOps UI
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: app

                - script: echo "Deploy to production — add your deployment steps here"
                  displayName: 'Deploy'
