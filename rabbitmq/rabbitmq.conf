# Listeners
listeners.tcp.default = 5672

# Management plugin loads definitions on startup
management.load_definitions = /etc/rabbitmq/definitions.json

# Logging
log.console = true
log.console.level = info

# Default vhost (user/pass managed via definitions.json — not duplicated here)
default_vhost = skillexa

# Consumer timeout (5 minutes) — prevents stuck consumers
consumer_timeout = 300000

# Heartbeat interval (seconds)
heartbeat = 60

# Channel limits
channel_max = 128
